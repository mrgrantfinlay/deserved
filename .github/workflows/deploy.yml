name: Deploy Worker

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-deserved
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout deserved
        uses: actions/checkout@v4

      - name: Checkout knowledge (doctrine source)
        uses: actions/checkout@v4
        with:
          repository: mrgrantfinlay/knowledge
          path: knowledge

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync doctrine catalog
        run: npm run sync:doctrine
        env:
          KNOWLEDGE_ROOT: ${{ github.workspace }}/knowledge

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy

      - name: Upload SIGNAL_API_KEY secret
        if: ${{ secrets.SIGNAL_API_KEY != '' }}
        run: printf '%s' "$SIGNAL_API_KEY" | npx wrangler secret put SIGNAL_API_KEY
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SIGNAL_API_KEY: ${{ secrets.SIGNAL_API_KEY }}
